<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        body {
            background-color: #808080; /* Tactical Grey Restored */
            color: #FFFFFF;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* Changed to min-height to fix Pixel 7a clipping */
            margin: 0;
            text-align: center;
            padding: 40px 20px; /* Added breathing room for mobile browser bars */
            box-sizing: border-box;
        }

        /* --- THE BRANDING (CENTERED) --- */
        .brand-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-seal {
            width: 150px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 480px; 
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            color: #E0E0E0;
            font-size: 0.9rem; /* Increased size as requested */
            letter-spacing: 0.05em;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            width: 56ch; /* Precise length for the new string */
            margin: 15px auto;
            animation: 
                typing 3.5s steps(56, end) forwards,
                blink-cursor 0.75s step-end infinite;
        }

        /* --- THE UTILITY SECTION (FADE-IN REVEAL) --- */
        .utility-wrapper {
            margin-top: 40px; /* Ensures space on small screens */
            padding-bottom: 20px;
            opacity: 0; 
            animation: fadeInReveal 1.5s ease-in 4s forwards;
        }

        .contact-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.5em;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .contact-link:hover {
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .footer {
            font-size: 0.55rem;
            color: #D0D0D0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* --- ANIMATIONS --- */
        @keyframes typing { from { width: 0 } to { width: 56ch } }
        @keyframes blink-cursor { from, to { border-right-color: transparent } 50% { border-right-color: #FFFFFF; } }
        @keyframes fadeInReveal { to { opacity: 1; } }

        /* Mobile Scale-down for Pixel 7a */
        @media (max-width: 600px) {
            .typewriter-byline { 
                font-size: 0.65rem; 
                width: 56ch; 
                margin-bottom: 40px;
            }
            .text-header { max-width: 90%; }
            .utility-wrapper { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="brand-wrapper">
        <img src="logo.png" alt="HIA Seal" class="logo-seal">
        <img src="text-header-lc.png" alt="Higher Intelligence Agency" class="text-header">
        
        <p class="typewriter-byline">
            Applied Research & Technology // Adaptive Systems ARTAS1
        </p>
    </div>

    <div class="utility-wrapper">
        <a href="#" onclick="window.location.href='mailto:' + 'contact' + '@' + 'hiagency' + '.digital'; return false;" class="contact-link">CONTACT</a>
        
        <div class="footer">
            © 2026 // HIA // ARTAS1
        </div>
    </div>

</body>
</html>
