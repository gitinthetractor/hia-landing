<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }
        .typewriter-h1 {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            overflow: hidden; 
            border-right: .15em solid #FFFFFF; 
            white-space: nowrap; 
            margin: 0 auto; 
            width: 28ch; 
            animation: 
                typing 2s steps(28, end),
                blink-cursor .75s step-end infinite;
        }
        .mission {
            color: #F0F0F0;
            max-width: 700px;
            line-height: 1.6;
            margin-bottom: 4rem;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            font-weight: 400;
            text-transform: uppercase;
            animation: fadeIn 1s ease-in 2.2s forwards;
            opacity: 0;
        }
        .contact-link {
            border: 1px solid #FFFFFF;
            color: #FFFFFF;
            padding: 12px 35px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            cursor: pointer;
            background: transparent;
            border-radius: 4px;
            outline: none;
        }
        .contact-link:hover {
            background-color: #FFFFFF;
            color: #808080;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }
        @keyframes typing { from { width: 0 } to { width: 28ch } }
        @keyframes blink-cursor { from, to { border-color: transparent } 50% { border-color: #FFFFFF; } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <img src="logo.png" alt="HIA Seal" class="logo">
    <h1 class="typewriter-h1">Higher Intelligence Agency</h1>
    <p class="mission">
        ART // AS // 1 : Applied Research & Technology // Adaptive Systems // 1
    </p>
    <button class="contact-link" onclick="contactHIA()">Say Hi</button>
    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>
</body>
</html>
