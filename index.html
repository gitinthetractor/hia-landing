<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- THE BRANDING (CENTERED) --- */
        .brand-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-seal {
            width: 150px;
            height: auto;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 480px; 
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            color: #E0E0E0;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            width: 64ch; 
            animation: 
                typing 3s steps(64, end) forwards,
                blink-cursor 0.75s step-end infinite;
        }

        /* --- THE UTILITY SECTION (BOTTOM) --- */
        .utility-wrapper {
            margin-top: auto;
            padding-bottom: 40px;
        }

        .contact-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .contact-link:hover {
            opacity: 1;
            letter-spacing: 0.3em; /* Subtle expansion on hover */
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        .footer {
            font-size: 0.55rem;
            color: #A0A0A0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* --- ANIMATIONS --- */
        @keyframes typing { from { width: 0 } to { width: 64ch } }
        @keyframes blink-cursor { from, to { border-right-color: transparent } 50% { border-right-color: #FFFFFF; } }

        /* Mobile Scale-down */
        @media (max-width: 600px) {
            .typewriter-byline { font-size: 0.55rem; width: 64ch; }
            .text-header { max-width: 80%; }
        }
    </style>
</head>
<body>

    <div class="brand-wrapper">
        <img src="logo.png" alt="HIA Seal" class="logo-seal">
        <img src="text-header-lc.png" alt="Higher Intelligence Agency" class="text-header">
        
        <p class="typewriter-byline">
            ART//AS//1: Applied Research & Technology // Adaptive Systems // 1
        </p>
    </div>

    <div class="utility-wrapper">
        <a href="javascript:void(0)" onclick="contactHIA()" class="contact-link">
            || CONTACT ||
        </a>

        <div class="footer">
            © 2026 // HIA // ART//AS//1
        </div>
    </div>

    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>

</body>
</html>
