<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* --- THE LOGO-TITLE BALANCE --- */
        .logo-seal {
            width: 150px; /* Stronger presence */
            height: auto;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 480px; /* Tighter title to make the logo pop */
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            color: #E0E0E0;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
            margin-bottom: 5rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            width: 64ch; 
            animation: 
                typing 3s steps(64, end),
                blink-cursor .75s step-end infinite;
        }

        /* --- ONE-LINE TERMINAL HANDSHAKE --- */
        .terminal-line {
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            opacity: 0;
            color: #D0D0D0;
            animation: fadeInTerminal 0.8s ease-out 4s forwards;
            white-space: nowrap;
        }

        .contact-trigger {
            color: #FFFFFF;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
            font-weight: 600;
        }

        .contact-trigger:hover {
            border-bottom: 1px solid #FFFFFF;
            opacity: 0.8;
        }

        /* --- THE SUBTLE FOOTER --- */
        .footer {
            position: fixed;
            bottom: 25px;
            font-size: 0.55rem;
            color: #A0A0A0; /* The subtle silver/grey */
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInTerminal 1s ease-in 5.5s forwards;
        }

        /* --- KEYFRAMES --- */
        @keyframes typing { from { width: 0 } to { width: 64ch } }
        @keyframes blink-cursor { from, to { border-color: transparent } 50% { border-color: #FFFFFF; } }
        @keyframes fadeInTerminal { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .typewriter-byline { font-size: 0.55rem; width: 64ch; }
            .terminal-line { font-size: 0.7rem; }
            .text-header { max-width: 80%; }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="HIA Seal" class="logo-seal">

    <img src="text-header-lc.png" alt="Higher Intelligence Agency" class="text-header">
    
    <p class="typewriter-byline">
        ART//AS//1: Applied Research & Technology // Adaptive Systems // 1
    </p>

    <div class="terminal-line">
        mesg: we're agentically human. &nbsp;>&nbsp;<a href="javascript:void(0)" onclick="contactHIA()" class="contact-trigger">Say Hi</a>
    </div>

    <div class="footer">
        © 2026 // HIA // ART//AS//1
    </div>

    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>

</body>
</html>
