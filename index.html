<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* --- THE BRAND BLOCK --- */
        .logo-seal {
            width: 130px;
            height: auto;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 600px; 
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            color: #E0E0E0;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
            margin-bottom: 5rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            width: 64ch; 
            animation: 
                typing 3s steps(64, end),
                blink-cursor .75s step-end infinite;
        }

        /* --- THE SEQUENTIAL TERMINAL SESSION --- */
        .terminal-session {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .term-line {
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            opacity: 0;
            white-space: nowrap;
            overflow: hidden;
        }

        /* Line 1: Status message */
        .line-1 {
            color: #D0D0D0;
            animation: fadeInTerminal 0.5s ease-out 4s forwards;
        }

        /* Line 2: The Action Link */
        .line-2 {
            color: #FFFFFF;
            animation: fadeInTerminal 0.5s ease-out 5s forwards;
        }

        .contact-trigger {
            color: #FFFFFF;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .contact-trigger:hover {
            border-bottom: 1px solid #FFFFFF;
        }

        /* --- THE FOOTER --- */
        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.55rem;
            color: #A0A0A0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInTerminal 1s ease-in 6s forwards;
        }

        /* --- ANIMATIONS --- */
        @keyframes typing { from { width: 0 } to { width: 64ch } }
        @keyframes blink-cursor { from, to { border-color: transparent } 50% { border-color: #FFFFFF; } }
        @keyframes fadeInTerminal { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Scale-down */
        @media (max-width: 600px) {
            .typewriter-byline { font-size: 0.55rem; width: 64ch; }
            .term-line { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="HIA" class="logo-seal">

    <img src="text-header-lc.png" alt="Higher Intelligence Agency" class="text-header">
    
    <p class="typewriter-byline">
        ART//AS//1: Applied Research & Technology // Adaptive Systems // 1
    </p>

    <div class="terminal-session">
        <div class="term-line line-1">[status]: we're agentically human.</div>
        <div class="term-line line-2">
            >&nbsp;<a href="javascript:void(0)" onclick="contactHIA()" class="contact-trigger">Say Hi</a>
        </div>
    </div>

    <div class="footer">
        © 2026 // HIA // ART//AS//1
    </div>

    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>

</body>
</html>
