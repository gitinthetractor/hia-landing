<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIA // Verified</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #FFFFFF;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 800px;

            margin-bottom: 1.5rem;

            color: #888;

            text-transform: uppercase;
        }
        .nav-links a {

            font-weight: bold;

            border: 1px solid #444;

        .nav-links a:hover {
            background-color: #FFFFFF;
            color: #1a1a1a;

        }
        .footer {

            bottom: 2rem;

        }
