<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .brand-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .logo-seal {
            width: 140px;
            height: auto;
            margin-bottom: 0.8rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 450px; 
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            color: #E0E0E0;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            /* 49 characters = "Applied Research & Technology // Adaptive Systems" */
            width: 49ch; 
            margin: 15px auto;
            animation: 
                typing 3s steps(49, end) forwards,
                blink-cursor 0.75s step-end infinite;
        }

        .utility-wrapper {
            margin-top: auto;
            padding-bottom: 40px;
            opacity: 0; 
            animation: fadeInReveal 1.5s ease-in 3s forwards;
        }

        .contact-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.1em; /* Tighter spacing as requested */
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .footer {
            font-size: 0.55rem;
            color: #D0D0D0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        @keyframes typing { from { width: 0 } to { width: 49ch } }
        @keyframes blink-cursor { from, to { border-right-color: transparent } 50% { border-right-color: #FFFFFF; } }
        @keyframes fadeInReveal { to { opacity: 1; } }

        /* Pixel 7a Scaling */
        @media (max-width: 600px) {
            .typewriter-byline { 
                font-size: 3vw; /* Slightly larger now that text is shorter */
                width: 49ch; 
            }
            .logo-seal { width: 110px; }
            .text-header { max-width: 85%; }
            .utility-wrapper { padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="brand-wrapper">
        <img src="logo.png" alt="HIA Seal" class="logo-seal">
        <img src="text-header-lc.png" alt="Higher Intelligence Agency" class="text-header">
        
        <p class="typewriter-byline">Applied Research & Technology // Adaptive Systems</p>
    </div>

    <div class="utility-wrapper">
        <a href="#" onclick="window.location.href='mailto:' + 'contact' + '@' + 'hiagency' + '.digital'; return false;" class="contact-link">CONTACT</a>
        <div class="footer">
            © 2026 // HIA // ART//AS//1
        </div>
    </div>

</body>
</html>
