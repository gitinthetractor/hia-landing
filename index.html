<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Using min-height and padding to allow for a 'spaced' layout */
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- THE TOP SECTION --- */
        .brand-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-seal {
            width: 140px;
            height: auto;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        .text-header {
            width: 100%;
            max-width: 650px; 
            height: auto;
            margin-bottom: 0.5rem;
        }

        .typewriter-byline {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            color: #E0E0E0;
            font-size: 0.75rem;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            width: 64ch; 
            animation: 
                typing 3s steps(64, end),
                blink-cursor .75s step-end infinite;
        }

        /* --- THE BOTTOM HANDSHAKE --- */
        .contact-container {
            margin-top: auto; /* Pushes this section to the bottom */
            padding-bottom: 60px; /* Distance from the very bottom/footer */
            opacity: 0;
            animation: fadeIn 2.5s ease-in 3.5s forwards; /* SLOWER 2.5s FADE */
        }

        .human-button {
            display: inline-block;
            color: #FFFFFF;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 40px;
            border-radius: 2px;
            transition: all 0.4s ease;
            cursor: pointer;
            background: transparent;
        }

        .human-button:hover {
            border-color: #FFFFFF;
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-line-1 {
            font-size: 1.1rem;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .btn-line-2 {
            font-size: 0.85rem;
            font-weight: 300;
            color: #D0D0D0;
            letter-spacing: 0.02em;
            display: block;
        }

        /* --- THE FOOTER --- */
        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.55rem;
            color: #A0A0A0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease-in 5.5s forwards;
        }

        @keyframes typing { from { width: 0 } to { width: 64ch } }
        @keyframes blink-cursor { from, to { border-color: transparent } 50% { border-color: #FFFFFF; } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Mobile Adjustment: Ensure the byline doesn't scroll off-screen */
        @media (max-width: 600px) {
            .typewriter-byline { font-size: 0.6rem; width: 64ch; }
            .human-button { padding: 15px 30px; }
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <img src="logo.png" alt="HIA" class="logo-seal">
        <img src="text-header-uc.png" alt="Higher Intelligence Agency" class="text-header">
        <p class="typewriter-byline">
            ART//AS//1: Applied Research & Technology // Adaptive Systems // 1
        </p>
    </div>

    <div class="contact-container">
        <a href="javascript:void(0)" onclick="contactHIA()" class="human-button">
            <span class="btn-line-1">Say Hi.</span>
            <span class="btn-line-2">We're agentically human.</span>
        </a>
    </div>

    <div class="footer">
        © 2026 // HIA // ART//AS//1
    </div

    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>

</body>
</html>
