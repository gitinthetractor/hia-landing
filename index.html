<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Intelligence Agency | HIA</title>
    <style>
        body {
            background-color: #808080; /* Tactical Grey */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* --- THE LOGO SEAL --- */
        .logo-seal {
            width: 150px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
        }

        /* --- THE CUSTOM IMAGE HEADER --- */
        .text-header {
            width: 100%;
            max-width: 650px; /* Adjusted for clarity */
            height: auto;
            margin-bottom: 0.5rem;
        }

        /* --- THE TECHNICAL BYLINE (68 CHARACTERS) --- */
        .typewriter-byline {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            color: #E0E0E0;
            font-size: 0.75rem;
            letter-spacing: 0.02em;
            margin-bottom: 4.5rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: .12em solid #FFFFFF;
            margin-left: auto;
            margin-right: auto;
            width: 68ch; 
            animation: 
                typing 3s steps(68, end),
                blink-cursor .75s step-end infinite;
        }

        /* --- THE HUMAN HANDSHAKE --- */
        .human-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            opacity: 0; 
            animation: fadeIn 1s ease-in 3.5s forwards;
            transition: all 0.3s ease;
            cursor: pointer;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }

        .human-link:hover {
            opacity: 0.7 !important;
            border-bottom: 1px solid #FFFFFF;
        }

        @keyframes typing { from { width: 0 } to { width: 68ch } }
        @keyframes blink-cursor { from, to { border-color: transparent } 50% { border-color: #FFFFFF; } }
        @keyframes fadeIn { to { opacity: 1; } }

    </style>
</head>
<body>

    <img src="logo.png" alt="HIA" class="logo-seal">

    <img src="text-header-uc.png" alt="Higher Intelligence Agency" class="text-header">
    
    <p class="typewriter-byline">
        ART//AS//1 // Applied Research & Technology // Adaptive Systems // 1
    </p>

    <a href="javascript:void(0)" onclick="contactHIA()" class="human-link">
        Say hi. We're human.
    </a>

    <script>
        function contactHIA() {
            var user = "info"; 
            var domain = "higherintelligence.agency";
            window.location.href = "mailto:" + user + "@" + domain;
        }
    </script>

</body>
</html>
